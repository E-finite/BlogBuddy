<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registreren - Blog Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>
  <body>
    <div class="login-page-bg">
      <div class="card login-card login-card-wide shadow rounded">
        <h2 class="text-center mb-4 login-title">Registreren</h2>
        <p class="auth-subtitle text-muted text-center mb-4">
          Maak je account aan om blogs te genereren.
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %}
        <div class="toast-container">
          {% for category, message in messages %}
          <div
            class="alert alert-{{ 'danger' if category == 'error' else category }} toast-slide-in"
          >
            <span>{{ message }}</span>
            <button class="modal-close" onclick="this.parentElement.remove()">
              ×
            </button>
          </div>
          {% endfor %}
        </div>
        <script>
          document.addEventListener("DOMContentLoaded", function () {
            document
              .querySelectorAll(".toast-container .alert")
              .forEach(function (el) {
                setTimeout(function () {
                  el.classList.remove("toast-slide-in");
                  el.classList.add("toast-slide-out");
                  setTimeout(function () {
                    el.remove();
                  }, 300);
                }, 5000);
              });
          });
        </script>
        {% endif %} {% endwith %}

        <form method="post" class="mt-4 auth-form-centered">
          <div class="mb-3">
            <label for="username" class="form-label">Gebruikersnaam</label>
            <input
              type="text"
              class="form-control input-field"
              id="username"
              name="username"
              value="{{ request.form.get('username', '') }}"
              required
              autofocus
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control input-field"
              id="email"
              name="email"
              value="{{ request.form.get('email', '') }}"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Wachtwoord</label>
            <input
              type="password"
              class="form-control input-field"
              id="password"
              name="password"
              placeholder=""
              required
            />
            <small class="form-text text-muted auth-hint"
              >Minimaal 8 tekens</small
            >
          </div>

          <div class="mb-3">
            <label for="confirm_password" class="form-label"
              >Bevestig wachtwoord</label
            >
            <input
              type="password"
              class="form-control input-field"
              id="confirm_password"
              name="confirm_password"
              placeholder=""
              required
            />
          </div>

          <button type="submit" class="btn btn-primary main-btn w-100 mb-3">
            Registreren
          </button>

          <div class="text-center auth-register-row">
            Al een account?
            <a
              href="{{ url_for('login') }}"
              class="text-decoration-none auth-register-link"
              >Inloggen</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
