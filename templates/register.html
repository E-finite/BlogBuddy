<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registreren - Blog Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <h1>Registreren</h1>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="username">Gebruikersnaam</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Wachtwoord</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            required
          />
          <div class="password-hint">Minimaal 8 karakters</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Bevestig wachtwoord</label>
          <input
            class="form-input"
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary">Registreren</button>
      </form>

      <div class="auth-links">
        Al een account? <a href="{{ url_for('login') }}">Inloggen</a>
      </div>
    </div>
  </body>
</html>
