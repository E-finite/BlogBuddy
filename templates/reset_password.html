<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nieuw wachtwoord instellen - Blog Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
    <style>
      .auth-container {
        max-width: 420px;
        margin: 100px auto;
        padding: 30px;
        background: var(--bg-primary);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-color);
      }
      .auth-container h1 {
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 14px;
      }
      .auth-copy {
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: var(--text-secondary);
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        font-size: 14px;
        box-sizing: border-box;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--border-color-hover);
      }
      .btn-primary {
        width: 100%;
        padding: 12px;
        background: var(--color-accent-500);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }
      .btn-primary:hover {
        background: var(--color-accent-600);
      }
      .flash-messages {
        margin-bottom: 20px;
      }
      .flash {
        padding: 12px;
        border-radius: var(--radius-md);
        margin-bottom: 10px;
      }
      .flash.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .flash.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .flash.info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
      .auth-links {
        text-align: center;
        margin-top: 20px;
        color: var(--text-secondary);
      }
      .auth-links a {
        color: var(--color-accent-500);
        text-decoration: none;
      }
      .auth-links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <h1>Nieuw wachtwoord instellen</h1>
      <p class="auth-copy">
        Kies een nieuw wachtwoord van minimaal 8 karakters.
      </p>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label for="new_password">Nieuw wachtwoord</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm_password">Bevestig wachtwoord</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
          />
        </div>

        <button type="submit" class="btn-primary">Wachtwoord opslaan</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('login') }}">Terug naar inloggen</a>
      </div>
    </div>
  </body>
</html>
