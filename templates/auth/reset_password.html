<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nieuw wachtwoord instellen - Blog Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <h1>Nieuw wachtwoord instellen</h1>
      <p class="auth-copy">
        Kies een nieuw wachtwoord van minimaal 8 karakters.
      </p>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="toast-container">
        {% for category, message in messages %}
        <div
          class="alert alert-{{ 'danger' if category == 'error' else category }} toast-slide-in"
        >
          <span>{{ message }}</span>
          <button class="modal-close" onclick="this.parentElement.remove()">
            ×
          </button>
        </div>
        {% endfor %}
      </div>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          document
            .querySelectorAll(".toast-container .alert")
            .forEach(function (el) {
              setTimeout(function () {
                el.classList.remove("toast-slide-in");
                el.classList.add("toast-slide-out");
                setTimeout(function () {
                  el.remove();
                }, 300);
              }, 5000);
            });
        });
      </script>
      {% endif %} {% endwith %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="new_password">Nieuw wachtwoord</label>
          <input
            class="form-input"
            type="password"
            id="new_password"
            name="new_password"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password"
            >Bevestig wachtwoord</label
          >
          <input
            class="form-input"
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary">
          Wachtwoord opslaan
        </button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('login') }}">Terug naar inloggen</a>
      </div>
    </div>
  </body>
</html>
