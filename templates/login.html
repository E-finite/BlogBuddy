<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Blog Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <h1>Inloggen</h1>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="username">Gebruikersnaam</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Wachtwoord</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            required
          />
        </div>

        <div class="form-group">
          <label class="inline-checkbox" for="remember">
            <input type="checkbox" id="remember" name="remember" />
            <span>Onthoud mij</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Inloggen</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('forgot_password') }}">Wachtwoord vergeten?</a
        ><br />
        Nog geen account? <a href="{{ url_for('register') }}">Registreren</a>
      </div>
    </div>
  </body>
</html>
