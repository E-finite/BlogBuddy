<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wachtwoord vergeten - Blog Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>
  <body>
    <div class="login-page-bg">
      <div class="card login-card login-card-wide shadow rounded">
        <h2 class="text-center mb-4 login-title">Wachtwoord vergeten</h2>
        <p class="auth-subtitle text-muted text-center mb-4">
          Vul je e-mailadres in. Als het bij ons bekend is, ontvang je een
          resetlink.
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %}
        <div class="mb-3">
          {% for category, message in messages %}
          <div
            class="alert alert-{{ 'danger' if category == 'error' else category }}"
            role="alert"
          >
            {{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %} {% endwith %}

        <form method="post" class="mt-4 auth-form-centered">
          <div class="mb-3">
            <label for="email" class="form-label">E-mailadres</label>
            <input
              type="email"
              class="form-control input-field"
              id="email"
              name="email"
              value="{{ email }}"
              placeholder="naam@voorbeeld.nl"
              required
              autofocus
            />
          </div>

          <button type="submit" class="btn btn-primary main-btn w-100 mb-3">
            Resetlink versturen
          </button>

          <div class="text-center">
            <a
              href="{{ url_for('login') }}"
              class="text-decoration-none auth-link"
            >
              Terug naar inloggen
            </a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
