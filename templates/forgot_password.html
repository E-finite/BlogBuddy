<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wachtwoord vergeten - Blog Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <h1>Wachtwoord vergeten</h1>
      <p class="auth-copy">
        Vul je e-mailadres in. Als het bij ons bekend is, ontvang je een reset
        link.
      </p>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">E-mailadres</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            value="{{ email }}"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary">Resetlink versturen</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('login') }}">Terug naar inloggen</a>
      </div>
    </div>
  </body>
</html>
