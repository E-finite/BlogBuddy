<section id="connect" class="page-section">
  <div class="section">
    <h2 class="section-title">WordPress Site Verbinden</h2>
    <div class="card">
      <form id="connect-site-form">
        <div class="form-group">
          <label class="form-label" for="wpBaseUrl">WordPress Base URL</label>
          <input
            type="url"
            id="wpBaseUrl"
            name="wpBaseUrl"
            class="form-input"
            placeholder="https://example.com"
            required
          />
          <div class="form-help">Zonder trailing slash</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="wpUsername">WordPress Username</label>
          <input
            type="text"
            id="wpUsername"
            name="wpUsername"
            class="form-input"
            placeholder="botuser"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="wpApplicationPassword">Application Password</label>
          <input
            type="password"
            id="wpApplicationPassword"
            name="wpApplicationPassword"
            class="form-input"
            placeholder="xxxx xxxx xxxx xxxx"
            required
          />
          <div class="form-help">
            WordPress Application Password (Users → Profile → Application Passwords)
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Site Verbinden</button>
      </form>
    </div>
  </div>
</section>
