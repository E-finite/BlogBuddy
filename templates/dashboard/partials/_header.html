<aside class="sidebar">
  <div class="sidebar-inner">
    <a class="logo" href="{{ url_for('home_page') }}">E-finite</a>

    <nav class="sidebar-nav" aria-label="Hoofdnavigatie">
      <a
        href="{{ url_for('home_page') }}"
        class="nav-link{% if current_page == 'home' %} active{% endif %}"
        >Home</a
      >
      <a
        href="{{ url_for('generate_page') }}"
        class="nav-link{% if current_page == 'generate' %} active{% endif %}"
        >Genereren</a
      >
      <a
        href="{{ url_for('publish_page') }}"
        class="nav-link{% if current_page == 'publish' %} active{% endif %}"
        >Publiceren</a
      >
      <a
        href="{{ url_for('archive_page') }}"
        class="nav-link{% if current_page == 'archive' %} active{% endif %}"
        >Archief</a
      >
      <a
        href="{{ url_for('connect_page') }}"
        class="nav-link{% if current_page == 'connect' %} active{% endif %}"
        >Verbinden</a
      >
      {% if user.is_admin %}
      <a
        href="{{ url_for('admin_panel') }}"
        class="nav-link{% if current_page == 'admin' %} active{% endif %}"
        >Admin</a
      >
      {% endif %}
    </nav>

    <div class="sidebar-user-card">
      <p class="sidebar-user-label">Ingelogd als</p>
      <p class="sidebar-user-name">{{ user.username }}</p>
      <a href="{{ url_for('logout') }}" class="btn btn-secondary sidebar-logout"
        >Uitloggen</a
      >
    </div>
  </div>
</aside>
